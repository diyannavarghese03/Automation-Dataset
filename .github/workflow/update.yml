name: Scheduled Data Update

on:
  schedule:
    # Runs every day at midnight UTC (Adjust using cron syntax if needed)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to manually trigger the workflow anytime from GitHub

permissions:
  contents: write # Crucial: Gives the workflow permission to push changes back to the repo

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository content
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies from requirements.txt
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Run your data update script
      - name: Run Update Script
        run: python update.py

      # 5. Commit and push the updated CSV file if changes exist
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/workflow_metrics.csv
          
          # Only commit if there are actual changes to prevent workflow errors
          if ! git diff --cached --quiet; then
            git commit -m "Automated data update: $(date)"
            git push
          else
            echo "No changes detected in metrics data."
          fi